<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding for proper text rendering -->
    <meta charset="UTF-8" />

    <!-- Website favicon -->
    <link
      rel="icon"
      type="image/png"
      href="https://img.icons8.com/?size=100&id=78189&format=png&color=000000"
    />

    <!-- Responsive design for all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="TruPower Energies - Premium lithium-ion batteries for electric vehicles, 3-wheelers, and inverters. Sustainable energy solutions with ISO 9001 certification."
    />
    <meta name="keywords" content="lithium battery, EV battery, 3-wheeler battery, inverter battery, LiFePO4, electric rickshaw, sustainable energy, India" />
    <meta name="author" content="TruPower Energies" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph Tags (Social Media Sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TruPower Energies - Energy Redefined" />
    <meta property="og:description" content="Premium lithium-ion batteries for a sustainable EV future. ISO 9001 certified. 24/7 support." />
    <meta property="og:url" content="https://www.trupower.co.in" />
    <meta property="og:image" content="https://img.icons8.com/?size=400&id=78189&format=png&color=000000" />
    <meta property="og:image:alt" content="TruPower Energies Logo" />
    <meta property="og:site_name" content="TruPower Energies" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TruPower Energies - Energy Redefined" />
    <meta name="twitter:description" content="Premium lithium-ion batteries for a sustainable EV future" />
    <meta name="twitter:image" content="https://img.icons8.com/?size=400&id=78189&format=png&color=000000" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.trupower.co.in/" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Browser page title -->
    <title>TruPower Energies - Premium EV Battery Solutions in India</title>

    <!-- Structured Data - Organization (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TruPower Energies",
        "url": "https://www.trupower.co.in",
        "logo": "https://img.icons8.com/?size=400&id=78189&format=png&color=000000",
        "description": "TruPower Energies delivers premium lithium-ion batteries for electric vehicles, 3-wheelers, and inverters with ISO 9001 certification.",
        "foundingDate": "2020",
        "areaServed": "IN",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "availableLanguage": ["en", "hi"]
        }
      }
    </script>
  </head>

  <body>
    <!-- React app mounts here -->
    <div id="root"></div>

    <!-- Main React/TypeScript entry file -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
